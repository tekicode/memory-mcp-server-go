name: Publish

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/tekicode/mms:latest,ghcr.io/tekicode/mms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    name: Trigger deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dispatch to furworks/memory-server
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/furworks/memory-server/dispatches" \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"sha\":\"$SHA\",\"image\":\"ghcr.io/tekicode/mms:$SHA\"}}"
